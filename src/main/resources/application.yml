server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/local_ai_assistant?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis:
  mapper-locations: classpath:mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true

ai:
  provider: kimi

ollama:
  base-url: http://localhost:11434
  embedding-model: nomic-embed-text
  connect-timeout: 3s
  read-timeout: 60s

kimi:
  base-url: https://api.moonshot.cn/v1
  api-key: ${MOONSHOT_API_KEY:}
  model: kimi-k2.6
  available-models:
    - kimi-k2.6
    - kimi-k2.5
    - kimi-k2-thinking

app:
  upload-dir: data/uploads
  max-context-length: 8000
  chunk-size: 400
  chunk-overlap: 80
  retrieval-top-k: 3
  memory:
    enabled: true
    max-turns: 6

rag:
  auto:
    enabled: true
  planner:
    enabled: true
    fallback-intent: KNOWLEDGE_SEARCH
  rewrite:
    enabled: true
    max-length: 160
  hybrid:
    enabled: true
    vector-weight: 1.0
    keyword-weight: 0.35
  mmr:
    enabled: true
    lambda: 0.75
    candidate-size: 12
  rerank:
    enabled: false
